apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: h1v2
  name: h1v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: h1v2
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: h1v2
    spec:
      serviceAccountName: useroot
      containers:
      - image: quay.io/klaj2210/postgres:v1
        name: postgres
        env:
          - name: POSTGRES_USER
            value: user
          - name: POSTGRES_PASSWORD
            value: password01
        ports:
        - containerPort: 5432
